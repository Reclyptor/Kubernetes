apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: factorio
  namespace: factorio
spec:
  endpointSelector:
    matchLabels:
      app: factorio
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "34197", protocol: UDP }]
    - fromEndpoints:
        - matchLabels:
            app: playit
            k8s:io.kubernetes.pod.namespace: playit
      toPorts:
        - ports: [{ port: "34197", protocol: UDP }]
  egress:
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
