apiVersion: v1
kind: Service
metadata:
  name: factorio-server
  namespace: factorio
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  type: LoadBalancer
  selector:
    app: factorio
  ports:
    - name: game
      port: 34197
      protocol: UDP

---
apiVersion: v1
kind: Service
metadata:
  name: factorio-rcon
  namespace: factorio
spec:
  type: ClusterIP
  selector:
    app: factorio
  ports:
    - name: rcon
      port: 27015
      protocol: TCP
