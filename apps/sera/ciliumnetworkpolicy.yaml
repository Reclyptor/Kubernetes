apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sera
  namespace: sera
spec:
  endpointSelector:
    matchLabels:
      app: sera
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: seraui
            k8s:io.kubernetes.pod.namespace: seraui
        - matchLabels:
            app: cloudflare
            k8s:io.kubernetes.pod.namespace: cloudflare
      toPorts:
        - ports: [{ port: "3001", protocol: TCP }]
  egress:
    - toEndpoints:
        - matchLabels:
            app: mongodb
            k8s:io.kubernetes.pod.namespace: mongodb
      toPorts:
        - ports: [{ port: "27017", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: redis
            k8s:io.kubernetes.pod.namespace: redis
      toPorts:
        - ports: [{ port: "6379", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: authentik
            k8s:io.kubernetes.pod.namespace: authentik
      toPorts:
        - ports:
            - { port: "9000", protocol: TCP }
            - { port: "9443", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app: ntfy
            k8s:io.kubernetes.pod.namespace: ntfy
      toPorts:
        - ports: [{ port: "80", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: qdrant
            k8s:io.kubernetes.pod.namespace: qdrant
      toPorts:
        - ports:
            - { port: "6333", protocol: TCP }
            - { port: "6334", protocol: TCP }
    - toEndpoints:
        - matchLabels:
            app: vllm
            k8s:io.kubernetes.pod.namespace: vllm
      toPorts:
        - ports: [{ port: "8000", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: minio
            k8s:io.kubernetes.pod.namespace: minio
      toPorts:
        - ports: [{ port: "9000", protocol: TCP }]
    - toEntities: [kube-apiserver]
      toPorts:
        - ports: [{ port: "6443", protocol: TCP }]
    - toEntities: [host]
      toPorts:
        - ports: [{ port: "53", protocol: ANY }]
          rules:
            dns: [{ matchPattern: "*" }]
    - toFQDNs:
        - matchName: "auth.reclyptor.com"
        - matchName: "api.anthropic.com"
        - matchName: "api.openai.com"
        - matchName: "api.search.brave.com"
        - matchName: "github.com"
        - matchName: "api.github.com"
        - matchName: "raw.githubusercontent.com"
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
