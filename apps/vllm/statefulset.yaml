apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm
  namespace: vllm
spec:
  serviceName: vllm-api
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - bytheon
      securityContext:
        fsGroup: 1000
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: Always
          args:
            - "--model"
            - "/data/models/Qwen3.6-27B-FP8"
            - "--tensor-parallel-size"
            - "2"
            - "--port"
            - "8000"
            - "--max-model-len"
            - "262144"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--compilation-config"
            - '{"cudagraph_mode":"FULL"}'
            - "--kv-cache-dtype"
            - "fp8"
            - "--enable-chunked-prefill"
            - "--max-num-batched-tokens"
            - "10240"
            - "--max-num-seqs"
            - "10"
            - "--enable-prefix-caching"
            - "--served-model-name"
            - "Qwen3.6-27B-FP8"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "qwen3_coder"
            - "--reasoning-parser"
            - "qwen3"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              nvidia.com/gpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 500Gi
