apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
  labels:
    app: openclaw
spec:
  type: LoadBalancer
  selector:
    app: openclaw
  ports:
    - name: http
      port: 18791
      targetPort: 18791
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: belugabot
  namespace: openclaw
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
  labels:
    app: belugabot
spec:
  type: LoadBalancer
  selector:
    app: belugabot
  ports:
    - name: http
      port: 18792
      targetPort: 18792
      protocol: TCP