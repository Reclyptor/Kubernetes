apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: belugabot
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app: belugabot
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "18792", protocol: TCP }]
  egress:
    - toFQDNs:
        - matchName: "discord.com"
        - matchName: "gateway.discord.gg"
        - matchName: "cdn.discordapp.com"
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app: openclaw
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "18791", protocol: TCP }]
