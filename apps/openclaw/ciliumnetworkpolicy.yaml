apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: belugabot
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app: belugabot
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "18792", protocol: TCP }]
  egress:
    - toCIDRSet:
        - cidr: "169.254.20.10/32"
      toPorts:
        - ports: [{ port: "53", protocol: ANY }]
          rules:
            dns: [{ matchPattern: "*" }]
    - toFQDNs:
        - matchName: "discord.com"
        - matchName: "gateway.discord.gg"
        - matchName: "cdn.discordapp.com"
        - matchName: "api.anthropic.com"
        - matchName: "api.openai.com"
        - matchName: "api.search.brave.com"
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: openclaw
            k8s:io.kubernetes.pod.namespace: openclaw
      toPorts:
        - ports: [{ port: "18791", protocol: TCP }]
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app: openclaw
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "18791", protocol: TCP }]
    - fromEndpoints:
        - matchLabels:
            app: belugabot
            k8s:io.kubernetes.pod.namespace: openclaw
      toPorts:
        - ports: [{ port: "18791", protocol: TCP }]
