apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lucebox-dflash
  namespace: lucebox
spec:
  serviceName: lucebox-dflash-api
  replicas: 0
  selector:
    matchLabels:
      app: lucebox-dflash
  template:
    metadata:
      labels:
        app: lucebox-dflash
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - bytheon
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: lucebox-dflash
          image: ghcr.io/reclyptor/lucebox-dflash:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
          volumeMounts:
            - name: models
              mountPath: /app/dflash/models
          resources:
            limits:
              nvidia.com/gpu: "1"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  volumeClaimTemplates:
    - metadata:
        name: models
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 50Gi
