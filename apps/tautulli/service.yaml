apiVersion: v1
kind: Service
metadata:
  name: tautulli
  namespace: tautulli
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
  labels:
    app: tautulli
spec:
  type: LoadBalancer
  selector:
    app: tautulli
  ports:
    - name: http
      port: 8181
      targetPort: 8181
      protocol: TCP

