apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-proxy
  namespace: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-proxy
  template:
    metadata:
      labels:
        app: ntfy-proxy
    spec:
      automountServiceAccountToken: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - fluxeon
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:latest
        imagePullPolicy: IfNotPresent
        args:
        - --provider=oidc
        - --upstream=http://ntfy.ntfy.svc.cluster.local:8095
        - --http-address=0.0.0.0:4180
        - --email-domain=*
        - --cookie-secure=true
        - --skip-provider-button=true
        - --reverse-proxy=true
        ports:
        - name: http
          containerPort: 4180
          protocol: TCP
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: ntfy-proxy-secret
              key: OAUTH2_PROXY_CLIENT_ID
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ntfy-proxy-secret
              key: OAUTH2_PROXY_CLIENT_SECRET
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: ntfy-proxy-secret
              key: OAUTH2_PROXY_COOKIE_SECRET
        - name: OAUTH2_PROXY_OIDC_ISSUER_URL
          valueFrom:
            secretKeyRef:
              name: ntfy-proxy-secret
              key: OAUTH2_PROXY_OIDC_ISSUER_URL
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
