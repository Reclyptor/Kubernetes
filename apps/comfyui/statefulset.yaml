apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: comfyui
  namespace: comfyui
spec:
  serviceName: comfyui-web
  replicas: 1
  selector:
    matchLabels:
      app: comfyui
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      automountServiceAccountToken: false
      runtimeClassName: nvidia
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - bytheon
      initContainers:
        - name: seed-manager
          image: ghcr.io/reclyptor/comfyui:latest
          command:
            - sh
            - -c
            - |
              rm -rf /mnt/custom_nodes/lost+found
              if [ ! -d /mnt/custom_nodes/ComfyUI-Manager ]; then
                cp -a /app/custom_nodes/ComfyUI-Manager /mnt/custom_nodes/
              fi
          volumeMounts:
            - name: custom-nodes
              mountPath: /mnt/custom_nodes
      containers:
        - name: comfyui
          image: ghcr.io/reclyptor/comfyui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8188
              protocol: TCP
          env:
            - name: TZ
              value: "America/Chicago"
          volumeMounts:
            - name: data
              mountPath: /app/models
            - name: output
              mountPath: /app/output
            - name: user
              mountPath: /app/user
            - name: input
              mountPath: /app/input
            - name: custom-nodes
              mountPath: /app/custom_nodes
            - name: pip-cache
              mountPath: /home/comfyui/.cache/pip
          resources:
            requests:
              cpu: "1000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 8188
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8188
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: pip-cache
          emptyDir: {}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 500Gi
    - metadata:
        name: output
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 50Gi
    - metadata:
        name: user
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: input
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: custom-nodes
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: iscsi-persistent-fs6712x
        resources:
          requests:
            storage: 10Gi
