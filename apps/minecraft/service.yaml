apiVersion: v1
kind: Service
metadata:
  name: minecraft-server
  namespace: minecraft
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  type: LoadBalancer
  selector:
    app: minecraft
  ports:
    - name: game
      port: 25565
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-rcon
  namespace: minecraft
spec:
  type: ClusterIP
  selector:
    app: minecraft
  ports:
    - name: rcon
      port: 25575
      protocol: TCP
