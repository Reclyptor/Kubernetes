apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: playit
  namespace: playit
spec:
  endpointSelector:
    matchLabels:
      app: playit
  egress:
    # DNS via the node-local proxy so FQDN policy can resolve api.playit.gg
    - toEntities: [host]
      toPorts:
        - ports: [{ port: "53", protocol: ANY }]
          rules:
            dns: [{ matchPattern: "*" }]
    # playit HTTPS control API — the only host contacted at runtime
    - toFQDNs:
        - matchName: "api.playit.gg"
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    # playit tunnel/control edge — playit's own registered netblock
    # (Developed Methods LLC, 69.9.176.0/20). Control is UDP 5525 and each
    # tunnel's data channel uses a server-chosen UDP port, so allow all UDP to
    # playit's range only. TCP stays locked to api.playit.gg:443 above.
    - toCIDR:
        - 69.9.176.0/20
      toPorts:
        - ports: [{ port: "1", endPort: 65535, protocol: UDP }]
    # forward tunneled player traffic to the game servers only
    - toEndpoints:
        - matchLabels:
            app: minecraft
            k8s:io.kubernetes.pod.namespace: minecraft
      toPorts:
        - ports: [{ port: "25565", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: factorio
            k8s:io.kubernetes.pod.namespace: factorio
      toPorts:
        - ports: [{ port: "34197", protocol: UDP }]
