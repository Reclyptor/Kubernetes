apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: playit
  namespace: playit
spec:
  endpointSelector:
    matchLabels:
      app: playit
  egress:
    # DNS via the node-local proxy so FQDN policy can resolve api.playit.gg
    - toEntities: [host]
      toPorts:
        - ports: [{ port: "53", protocol: ANY }]
          rules:
            dns: [{ matchPattern: "*" }]
    # playit HTTPS control API — the only host contacted at runtime
    - toFQDNs:
        - matchName: "api.playit.gg"
      toPorts:
        - ports: [{ port: "443", protocol: TCP }]
    # playit tunnel/control edge servers — IPs come dynamically from the routing
    # API, so they cannot be pinned to an FQDN
    - toEntities: [world]
      toPorts:
        - ports: [{ port: "5525", protocol: UDP }]
    # forward tunneled player traffic to the game servers only
    - toEndpoints:
        - matchLabels:
            app: minecraft
            k8s:io.kubernetes.pod.namespace: minecraft
      toPorts:
        - ports: [{ port: "25565", protocol: TCP }]
    - toEndpoints:
        - matchLabels:
            app: factorio
            k8s:io.kubernetes.pod.namespace: factorio
      toPorts:
        - ports: [{ port: "34197", protocol: UDP }]
