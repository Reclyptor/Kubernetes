apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  selector:
    app: minio
  type: LoadBalancer
  ports:
    - name: api
      port: 9500
      targetPort: 9000
    - name: console
      port: 9501
      targetPort: 9001

