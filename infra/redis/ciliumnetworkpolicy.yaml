apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redis
  namespace: redis
spec:
  endpointSelector:
    matchLabels:
      app: redis
  ingress:
    - fromEntities: [world, remote-node, health]
      toPorts:
        - ports: [{ port: "6379", protocol: TCP }]
    - fromEndpoints:
        - matchLabels:
            app: authentik
            k8s:io.kubernetes.pod.namespace: authentik
        - matchLabels:
            app: sera
            k8s:io.kubernetes.pod.namespace: sera
      toPorts:
        - ports: [{ port: "6379", protocol: TCP }]
