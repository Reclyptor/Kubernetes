apiVersion: v1
kind: Service
metadata:
  name: agentmemory-claude
  namespace: agentmemory
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  selector:
    app: agentmemory-claude
  type: LoadBalancer
  ports:
    - name: rest
      port: 3111
      targetPort: 3111
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: agentmemory-qwen
  namespace: agentmemory
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  selector:
    app: agentmemory-qwen
  type: LoadBalancer
  ports:
    - name: rest
      port: 3211
      targetPort: 3111
      protocol: TCP
