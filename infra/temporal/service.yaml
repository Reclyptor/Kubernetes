apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: temporal
spec:
  selector:
    app: temporal
  type: ClusterIP
  ports:
    - name: frontend
      port: 7233
      targetPort: 7233

---
apiVersion: v1
kind: Service
metadata:
  name: temporal-web
  namespace: temporal
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  selector:
    app: temporal-web
  type: LoadBalancer
  ports:
    - name: http
      port: 7234
      targetPort: 8080

