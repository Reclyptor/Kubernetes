apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: mysql
  annotations:
    lbipam.cilium.io/sharing-key: "lan-shared"
    lbipam.cilium.io/sharing-cross-namespace: "*"
    lbipam.cilium.io/ips: "192.168.1.120"
spec:
  selector:
    app: mysql
  type: LoadBalancer
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
