apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: baseline
spec:
  description: "Zero-trust foundation: default-deny for all non-system workloads, allowing only the universals — kubelet/health probes in, plain L4 DNS out."
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values: [kube-system, flux-system]
      - key: reserved:health
        operator: DoesNotExist
  ingress:
    - fromEntities: [host, health]
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports: [{ port: "53", protocol: ANY }]
