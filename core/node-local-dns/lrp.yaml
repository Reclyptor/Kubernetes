apiVersion: cilium.io/v2
kind: CiliumLocalRedirectPolicy
metadata:
  name: node-local-dns
  namespace: kube-system
spec:
  skipRedirectFromBackend: true
  redirectFrontend:
    addressMatcher:
      ip: "10.43.0.10"
      toPorts:
        - port: "53"
          protocol: UDP
  redirectBackend:
    localEndpointSelector:
      matchLabels:
        k8s-app: node-local-dns
    toPorts:
      - port: "53"
        protocol: UDP
